<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>List Quizzes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container-fluid">
        <div class="row">

            <div th:replace="fragments/sidebar :: sidebar(userId=${userId})"></div>

            <div class="col-md-9 col-lg-10 main-content">
                <div class="form-container">
                    <h3 class="mb-4 mt-4">All of your Quizzes</h3>
                    <div class="col-md-9 col-lg-10 main-content">
                        <h2 th:if="${#lists.isEmpty(quizzes)}">No Quizzes available right now</h2>
                        <div class="row g-4">
                            <div th:each="quiz: ${quizzes}" class="col-12 col-md-6 quiz-card">
                                <div class="card h-100">
                                    <div class="card-body">
                                        <h5 class="card-title" th:text="${quiz.title}"></h5>
                                        <p class="card-text" th:text="${quiz.description}"></p>
                                        <button class="btn btn-sm btn-primary">Edit</button>
                                        <button class="btn btn-sm btn-danger">Delete</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
