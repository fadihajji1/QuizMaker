<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .main-content { padding: 30px; }
        .form-container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-success { width: 100%; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">

        <div th:replace="fragments/sidebar :: sidebar(userId=${userId})"></div>

        <div class="col-md-9 col-lg-10 main-content">
            <div class="form-container">
                <h3 class="mb-4">Add New Quiz</h3>
                <form th:object="${quizForm}" th:action="@{/dashboard/quiz/create}" method="post">
                    <div class="mb-3">
                        <label for="title" class="form-label">Quiz Title</label>
                        <input type="text" class="form-control" id="title" name="title" th:field="*{title}" placeholder="Enter title" required>
                    </div>
                    <div class="mb-3">
                        <label for="quiz-description" class="form-label">Description</label>
                        <textarea class="form-control" id="quiz-description" name="description" th:field="*{description}" rows="4" placeholder="Enter description" required></textarea>
                    </div>

                    <div class="mb-3">
                        <div class="mb-3">
                            <label for="quiz-durationHours" class="form-label">Duration Hours</label>
                            <input type="number"
                                   class="form-control"
                                   id="quiz-durationHours"
                                   th:field="*{durationHours}"
                                   min="0"
                                   placeholder="Hours"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label for="quiz-durationMinutes" class="form-label">Duration Minutes</label>
                            <input type="number"
                                   class="form-control"
                                   id="quiz-durationMinutes"
                                   th:field="*{durationMinutes}"
                                   min="0"
                                   max="59"
                                   placeholder="Minutes"
                                   required>
                        </div>


                    </div>
                    <button type="submit" class="btn btn-success mt-3">Create Quiz</button>
                </form>
            </div>
        </div>

    </div>
</div>
</body>
</html>
