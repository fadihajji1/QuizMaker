<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Questions & Answers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container-fluid">

    <div class="row">
        <div th:replace="fragments/sidebar :: sidebar(userId=${userId})"></div>

        <div class="col-md-9 col-lg-10 main-content">
            <div class="form-container">
                <h2>Manage Questions & Answers</h2>
                <div class="form-container">
                    <form th:object="${questionForm}" th:action="@{/dashboard/quiz/add/{id}/questions(id=${quiz.quizId})}" method="post">
                        <div class="mb-3">
                            <label for="question" class="form-label">Add New Question</label>
                            <input type="text" class="form-control" id="question" name="question" th:field="*{question}" placeholder="Enter the question" required>
                        </div>
                        <button type="submit" class="btn btn-success mt-3">Add</button>
                    </form>
                </div>

                <h3 th:if="${#lists.isEmpty(questions)}">No Questions yet</h3>

                <div th:if="${!#lists.isEmpty(questions)}">
                    <h3>Existing Questions</h3>

                    <ul class="list-group">
                        <li class="list-group-item d-flex align-items-center"
                            th:each="q : ${questions}">

                            <!-- LEFT: Question + points -->
                            <div class="flex-grow-1">
                                <strong th:text="${q.question}"></strong>
                                <span class="badge bg-secondary ms-2"
                                      th:text="${q.points + ' pts'}"></span>
                            </div>

                            <!-- RIGHT: Fixed buttons -->
                            <div class="btn-group ms-3 flex-shrink-0">
                                <button class="btn btn-sm btn-primary"
                                        data-bs-toggle="modal"
                                        data-bs-target="#manageQuestionModal"
                                        th:attr="data-id=${q.questionId}">
                                    Manage
                                </button>

                                <form th:action="@{/dashboard/quiz/edit/{quizId}/questions/delete/{questionId}(quizId=${q.quizId},questionId=${q.questionId})}"
                                      method="post" style="display:inline">
                                    <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                                </form>
                            </div>

                            <div class="modal fade" id="manageQuestionModal" tabindex="-1"
                                 aria-labelledby="manageQuestionModalLabel" aria-hidden="true">

                                <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
                                    <div class="modal-content">

                                        <!-- HEADER -->
                                        <div class="modal-header">
                                            <h5 class="modal-title" id="manageQuestionModalLabel">
                                                Manage Question
                                            </h5>
                                            <button type="button" class="btn-close"
                                                    data-bs-dismiss="modal"></button>
                                        </div>

                                        <!-- BODY -->
                                        <div class="modal-body">

                                            <!-- UPDATE QUESTION -->
                                            <form id="updateQuestionForm">
                                                <input type="hidden" id="questionId">

                                                <div class="mb-3">
                                                    <label class="form-label">Question</label>
                                                    <textarea class="form-control"
                                                              id="questionText"
                                                              rows="2"></textarea>
                                                </div>

                                                <div class="row">
                                                    <div class="col-md-6">
                                                        <label class="form-label">Points</label>
                                                        <input type="number"
                                                               class="form-control"
                                                               id="questionPoints">
                                                    </div>

                                                    <div class="col-md-6">
                                                        <label class="form-label">Type</label>
                                                        <select class="form-select" id="questionType">
                                                            <option value="SINGLE">Single choice</option>
                                                            <option value="MULTIPLE">Multiple choice</option>
                                                        </select>
                                                    </div>
                                                </div>
                                            </form>

                                            <hr>

                                            <!-- ANSWERS -->
                                            <h6>Answers</h6>
                                            <ul class="list-group mb-3" id="answersList">
                                                <!-- Loaded dynamically -->
                                            </ul>

                                            <!-- ADD ANSWER -->
                                            <div class="input-group">
                                                <input type="text"
                                                       class="form-control"
                                                       id="newAnswerText"
                                                       placeholder="New answer">
                                                <button class="btn btn-success"
                                                        id="addAnswerBtn">
                                                    Add
                                                </button>
                                            </div>

                                        </div>

                                        <!-- FOOTER -->
                                        <div class="modal-footer">
                                            <button class="btn btn-secondary"
                                                    data-bs-dismiss="modal">
                                                Close
                                            </button>
                                            <button class="btn btn-primary"
                                                    id="saveQuestionBtn">
                                                Save changes
                                            </button>
                                        </div>

                                    </div>
                                </div>
                            </div>


                        </li>
                    </ul>
                </div>

            </div>
        </div>
    </div>

</div>
<script>
    document.getElementById('manageQuestionModal')
        .addEventListener('show.bs.modal', function (event) {

            const button = event.relatedTarget;
            const questionId = button.getAttribute('data-id');

            document.getElementById('questionId').value = questionId;

            // Later:
            // fetch(`/dashboard/question/${questionId}`)
            //   .then(res => res.json())
            //   .then(data => fill modal)
        });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
