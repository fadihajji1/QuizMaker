<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Questions & Answers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container-fluid">

    <div class="row">
        <div th:replace="fragments/sidebar :: sidebar(userId=${userId})"></div>

        <div class="col-md-9 col-lg-10 main-content">
            <div class="form-container">
                <h2>Manage Questions & Answers</h2>
                <div class="form-container">
                    <form th:object="${questionForm}" th:action="@{/dashboard/quiz/add/{id}/questions(id=${quiz.quizId})}" method="post">
                        <div class="mb-3">
                            <label for="question" class="form-label">Add New Question</label>
                            <input type="text" class="form-control" id="question" name="question" th:field="*{question}" placeholder="Enter the question" required>
                        </div>
                        <button type="submit" class="btn btn-success mt-3">Add</button>
                    </form>
                </div>

                <h3 th:if="${#lists.isEmpty(questions)}">No Questions yet</h3>

                <div th:if="${!#lists.isEmpty(questions)}">
                <h3>Existing Questions</h3>
                <ul class="list-group">
                    <li class="list-group-item"
                        th:each="q : ${questions}">
                        <span th:text="${q.question}"></span>
                    </li>
                </ul>
            </div>

            </div>
        </div>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
