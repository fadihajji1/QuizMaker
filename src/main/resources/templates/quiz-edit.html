<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container-fluid">

    <div class="row">
        <div th:replace="fragments/sidebar :: sidebar(userId=${userId})"></div>

        <div class="col-md-9 col-lg-10 main-content">
            <div class="form-container">
                <h2>Edit Quiz</h2>
                <!-- Edit Quiz Form -->
                <form th:action="@{|/dashboard/quiz/${quiz.quizId}/update|}" method="post" class="mb-4">
                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input class="form-control" name="title" th:value="${quiz.title}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" name="description" rows="3"
                                  th:text="${quiz.description}" required></textarea>
                    </div>

                    <button class="btn btn-primary">Save Changes</button>
                </form>

                <hr>

                <h3>Questions</h3>

                <a th:href="@{'/dashboard/quiz/' + ${quiz.quizId} + '/question/add'}" class="btn btn-success mb-3">
                    Add Question
                </a>
            </div>
        </div>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
