<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Quizzes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #343a40; color: white; padding-top: 20px; }
        .sidebar .nav-link { color: white; }
        .sidebar .nav-link.active { background-color: #495057; border-radius: 5px; }
        .main-content { padding: 20px; }
        .quiz-card { margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:replace="fragments/sidebar :: sidebar"></div>

        <div class="col-md-9 col-lg-10 main-content">
            <h3>My Quizzes</h3>
            <div class="row">
                <!-- Example quiz cards -->
                <div class="col-md-6 quiz-card">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">Sample Quiz 1</h5>
                            <p class="card-text">Description of the quiz...</p>
                            <button class="btn btn-sm btn-primary">Edit</button>
                            <button class="btn btn-sm btn-danger">Delete</button>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 quiz-card">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">Sample Quiz 2</h5>
                            <p class="card-text">Description of the quiz...</p>
                            <button class="btn btn-sm btn-primary">Edit</button>
                            <button class="btn btn-sm btn-danger">Delete</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
